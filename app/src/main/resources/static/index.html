<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉDEN - Context Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            /* NOVA PALETA DE CORES SUPER ESCURA */
            --bg-fe: #0a0a0c;          /* Fundo do Chat: Cinza quase preto */
            --sidebar-dark: #131316;   /* Barra Lateral: Cinza muito escuro */
            --msg-ia: #1a1a1f;         /* Mensagem IA: Cinza carvão escuro */
            --msg-user: #0f3057;       /* Azul Escuro (AE) */
            --divider-ae: #0f3057;     /* Divisória Azul Escuro (AE) */

            --text-main: #e2e8f0;      /* Texto principal claro e legível */
            --text-muted: #8b949e;
            --input-bg: #16161a;
            --primary-accent: #00d2ff; /* Ciano/Azul neon para pequenos detalhes (logo) */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-fe);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Barra Lateral --- */
        #sidebar {
            width: 280px;
            background-color: var(--sidebar-dark);
            /* A linha divisória em Azul Escuro (AE) que você pediu */
            border-right: 2px solid var(--divider-ae);
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            transition: all 0.3s;
            box-shadow: 2px 0 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #sidebar h2 { font-size: 0.9rem; color: var(--text-muted); margin-top: 0; text-transform: uppercase; letter-spacing: 1px;}

        #btn-new-chat {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--divider-ae);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            transition: all 0.2s;
        }
        #btn-new-chat:hover { background-color: var(--msg-user); border-color: var(--msg-user); }

        #chats-recentes {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* Custom Scrollbar para a barra lateral */
        #chats-recentes::-webkit-scrollbar { width: 6px; }
        #chats-recentes::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 10px; }

        .item-chat {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background-color 0.2s, color 0.2s;
        }
        .item-chat:hover { background-color: #1e1e24; color: var(--text-main); }
        .item-chat.active { background-color: var(--msg-ia); color: var(--primary-accent); font-weight: 600; border-left: 3px solid var(--primary-accent); }

        /* --- Área Principal de Chat --- */
        #main-content {
            flex-grow: 1;
            background-color: var(--bg-fe);
            display: flex;
            flex-direction: column;
        }

        /* Header com a Logo */
        #header {
            padding: 15px 30px;
            background-color: var(--bg-fe);
            border-bottom: 1px solid #1a1a20;
            display: flex;
            justify-content: center; /* Centraliza a logo */
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .logo-container img {
            height: 45px; /* Tamanho da logo de lótus */
            width: auto;
        }

        #chat-box {
            flex-grow: 1;
            padding: 40px 10%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Custom Scrollbar para o chat */
        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 10px; }

        /* --- Estilo de Mensagens --- */
        .mensagem {
            padding: 15px 22px;
            border-radius: 12px;
            max-width: 80%;
            line-height: 1.6;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .mensagem strong { color: #fff; }
        .mensagem pre { background: #000; padding: 10px; border-radius: 6px; overflow-x: auto; }
        .mensagem code { font-family: 'Courier New', Courier, monospace; color: var(--primary-accent); }

        .user {
            background-color: var(--msg-user);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .eden {
            background-color: var(--msg-ia);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #23232a;
        }

        /* --- Área de Input e Rodapé --- */
        #footer-area {
            padding: 20px 10%;
            background-color: var(--bg-fe);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #input-container {
            width: 100%;
            display: flex;
            background-color: var(--input-bg);
            border-radius: 24px;
            padding: 8px;
            border: 1px solid #2a2a35;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: border-color 0.3s;
        }
        #input-container:focus-within { border-color: var(--divider-ae); }

        #userInput {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 10px 20px;
            font-size: 1.05rem;
            outline: none;
        }

        #sendBtn {
            background-color: var(--msg-user);
            color: var(--text-main);
            border: none;
            border-radius: 18px;
            padding: 10px 25px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 10px;
            transition: background-color 0.2s;
        }
        #sendBtn:hover { background-color: #16467a; }

        #powered-by {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

    </style>
</head>
<body>

<aside id="sidebar">
    <button id="btn-new-chat">+ Nova Sessão</button>
    <h2>Histórico Local</h2>
    <div id="chats-recentes">
        <div class="item-chat loading">Carregando memórias...</div>
    </div>
</aside>

<main id="main-content">
    <div id="header">
        <div class="logo-container">
            <img src="logo-eden.png" alt="Logo ÉDEN">
        </div>
    </div>

    <div id="chat-box">
        <div class="mensagem eden">Saudações. O núcleo <strong>ÉDEN</strong> foi atualizado para o protocolo visual escuro.<br>Selecione uma base de dados na lateral para iniciarmos.</div>
    </div>

    <div id="footer-area">
        <div id="input-container">
            <input type="text" id="userInput" placeholder="Forneça as diretrizes para o ÉDEN...">
            <button id="sendBtn">Enviar</button>
        </div>

        <p id="powered-by">
            <img src="https://www.gstatic.com/images/branding/product/1x/gemini_32dp.png" alt="Gemini Logo" width="14" height="14">
            Powered by Gemini API
        </p>
    </div>
</main>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const sidebar = document.getElementById('chats-recentes');
    const btnNewChat = document.getElementById('btn-new-chat');

    let sessaoAtual = null;

    marked.setOptions({ sanitize: true });

    function adicionarBalao(texto, remetente) {
        const div = document.createElement('div');
        div.className = `mensagem ${remetente}`;
        if (remetente === 'eden') {
            div.innerHTML = marked.parse(texto);
        } else {
            div.textContent = texto;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function carregarListaChats() {
        sidebar.innerHTML = '';
        try {
            const response = await fetch('/api/chats');
            const chats = await response.json();
            chats.forEach(nomeChat => {
                const div = document.createElement('div');
                div.className = 'item-chat';
                if (nomeChat === sessaoAtual) div.classList.add('active');
                div.textContent = nomeChat.replace(/_/g, ' ').toUpperCase();
                div.onclick = () => carregarSessao(nomeChat);
                sidebar.appendChild(div);
            });
        } catch (error) {
            sidebar.innerHTML = '<div class="item-chat error">Erro ao carregar chats.</div>';
        }
    }

    async function carregarSessao(nomeChat) {
        if (nomeChat === sessaoAtual) return;
        sessaoAtual = nomeChat;
        chatBox.innerHTML = '';
        userInput.focus();
        carregarListaChats();

        adicionarBalao(`Iniciando a sessão: <strong>${nomeChat.toUpperCase()}</strong>...`, 'eden');

        try {
            const response = await fetch(`/api/chat-historico/${nomeChat}`);
            const historico = await response.json();
            historico.forEach(msg => {
                adicionarBalao(msg.texto, msg.role === 'model' ? 'eden' : 'user');
            });
        } catch (error) {
            adicionarBalao("Erro crítico ao restaurar a memória desta sessão.", 'eden');
        }
    }

    async function enviarMensagem() {
        if (!sessaoAtual) {
            adicionarBalao("Por favor, selecione um chat existente ou crie um novo na barra lateral.", 'eden');
            return;
        }
        const texto = userInput.value.trim();
        if (!texto) return;

        adicionarBalao(texto, 'user');
        userInput.value = '';

        const loadingId = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = loadingId;
        loadingDiv.className = 'mensagem eden';
        loadingDiv.innerHTML = '<em>Processando diretrizes...</em>';
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(`/api/chat/${sessaoAtual}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ texto: texto })
            });
            const data = await response.json();
            document.getElementById(loadingId).remove();
            adicionarBalao(data.texto, 'eden');
        } catch (error) {
            document.getElementById(loadingId).remove();
            adicionarBalao("Erro de conexão com o servidor local.", 'eden');
        }
    }

    btnNewChat.onclick = () => {
        const nomeNewChat = prompt("Digite o nome do novo contexto:");
        if (nomeNewChat) carregarSessao(nomeNewChat);
    };
    sendBtn.addEventListener('click', enviarMensagem);
    userInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') enviarMensagem(); });
    carregarListaChats();
</script>
</body>
</html>
